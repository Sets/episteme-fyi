<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#110F1A"/>
      <stop offset="100%" stop-color="#07060A"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3C2D8C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#07060A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="24" fill="url(#bgGrad)"/>

  <!-- Inner glow -->
  <ellipse cx="150" cy="135" rx="110" ry="90" fill="url(#glowGrad)"/>

  <!-- Outer ring -->
  <circle cx="150" cy="148" r="108" fill="none" stroke="#C8B8E8" stroke-width="0.6" opacity="0.25"/>
  <!-- Inner ring -->
  <circle cx="150" cy="148" r="88" fill="none" stroke="#C8B8E8" stroke-width="0.4" opacity="0.15"/>

  <!-- Cross ticks -->
  <line x1="150" y1="32" x2="150" y2="48" stroke="#C8B8E8" stroke-width="0.8" opacity="0.40"/>
  <line x1="150" y1="248" x2="150" y2="264" stroke="#C8B8E8" stroke-width="0.8" opacity="0.40"/>
  <line x1="34" y1="148" x2="50" y2="148" stroke="#C8B8E8" stroke-width="0.8" opacity="0.40"/>
  <line x1="250" y1="148" x2="266" y2="148" stroke="#C8B8E8" stroke-width="0.8" opacity="0.40"/>

  <!-- Diagonal ticks -->
  <line x1="73" y1="71" x2="84" y2="82" stroke="#C8B8E8" stroke-width="0.6" opacity="0.28"/>
  <line x1="227" y1="71" x2="216" y2="82" stroke="#C8B8E8" stroke-width="0.6" opacity="0.28"/>
  <line x1="73" y1="225" x2="84" y2="214" stroke="#C8B8E8" stroke-width="0.6" opacity="0.28"/>
  <line x1="227" y1="225" x2="216" y2="214" stroke="#C8B8E8" stroke-width="0.6" opacity="0.28"/>

  <!-- ε — main -->
  <text x="150" y="178"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="112"
    text-anchor="middle"
    fill="#EDE9F8"
    opacity="0.97">ε</text>

  <!-- knowledge · unveiled — bottom -->
  <text x="150" y="242"
    font-family="'Courier New', monospace"
    font-size="11"
    letter-spacing="3"
    text-anchor="middle"
    fill="#A89EC8"
    opacity="0.60">knowledge · unveiled</text>
</svg>
