<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#110F1A"/>
      <stop offset="100%" stop-color="#07060A"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="30%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#3C2D8C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#07060A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="75%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#2D1F6A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#07060A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bgGrad)"/>
  <rect width="1200" height="627" fill="url(#glowLeft)"/>
  <rect width="1200" height="627" fill="url(#glowRight)"/>

  <!-- Subtle scanline texture -->
  <rect width="1200" height="627" fill="none" stroke="#C8B8E8" stroke-width="0.15" opacity="0.04"
    stroke-dasharray="0,18"/>

  <!-- Left emblem — rings -->
  <circle cx="340" cy="314" r="220" fill="none" stroke="#C8B8E8" stroke-width="0.7" opacity="0.20"/>
  <circle cx="340" cy="314" r="178" fill="none" stroke="#C8B8E8" stroke-width="0.5" opacity="0.13"/>
  <circle cx="340" cy="314" r="105" fill="none" stroke="#C8B8E8" stroke-width="0.4" opacity="0.10"/>

  <!-- Cross ticks -->
  <line x1="340" y1="78" x2="340" y2="108" stroke="#C8B8E8" stroke-width="1" opacity="0.35"/>
  <line x1="340" y1="520" x2="340" y2="550" stroke="#C8B8E8" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="314" x2="134" y2="314" stroke="#C8B8E8" stroke-width="1" opacity="0.35"/>
  <line x1="546" y1="314" x2="576" y2="314" stroke="#C8B8E8" stroke-width="1" opacity="0.35"/>

  <!-- Diagonal ticks -->
  <line x1="174" y1="148" x2="196" y2="170" stroke="#C8B8E8" stroke-width="0.7" opacity="0.22"/>
  <line x1="506" y1="148" x2="484" y2="170" stroke="#C8B8E8" stroke-width="0.7" opacity="0.22"/>
  <line x1="174" y1="480" x2="196" y2="458" stroke="#C8B8E8" stroke-width="0.7" opacity="0.22"/>
  <line x1="506" y1="480" x2="484" y2="458" stroke="#C8B8E8" stroke-width="0.7" opacity="0.22"/>

  <!-- ε glyph -->
  <text x="340" y="390"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="260"
    text-anchor="middle"
    fill="#EDE9F8"
    opacity="0.95">ε</text>

  <!-- Divider line -->
  <line x1="660" y1="160" x2="660" y2="467" stroke="#C8B8E8" stroke-width="0.6" opacity="0.18"/>

  <!-- Right side — EPISTEME -->
  <text x="720" y="290"
    font-family="'Courier New', monospace"
    font-size="72"
    font-weight="700"
    letter-spacing="14"
    text-anchor="start"
    fill="#EDE9F8"
    opacity="0.96">EPISTEME</text>

  <!-- Tagline -->
  <text x="722" y="348"
    font-family="'Courier New', monospace"
    font-size="16"
    letter-spacing="5"
    text-anchor="start"
    fill="#A89EC8"
    opacity="0.65">knowledge · unveiled</text>

  <!-- Thin rule below tagline -->
  <line x1="722" y1="368" x2="1120" y2="368" stroke="#C8B8E8" stroke-width="0.5" opacity="0.18"/>

  <!-- Stars — scattered right side -->
  <rect x="740" y="410" width="2" height="2" fill="#D4C8F0" opacity="0.45"/>
  <rect x="820" y="430" width="1.5" height="1.5" fill="#D4C8F0" opacity="0.30"/>
  <rect x="910" y="400" width="2.5" height="2.5" fill="#D4C8F0" opacity="0.55"/>
  <rect x="980" y="445" width="1.5" height="1.5" fill="#D4C8F0" opacity="0.28"/>
  <rect x="1050" y="415" width="2" height="2" fill="#D4C8F0" opacity="0.40"/>
  <rect x="1100" y="435" width="1" height="1" fill="#D4C8F0" opacity="0.25"/>
  <rect x="860" y="460" width="1.5" height="1.5" fill="#D4C8F0" opacity="0.32"/>
  <rect x="1010" y="390" width="2" height="2" fill="#D4C8F0" opacity="0.38"/>

  <!-- Corner coord — bottom right -->
  <text x="1170" y="610"
    font-family="'Courier New', monospace"
    font-size="9"
    letter-spacing="1"
    text-anchor="end"
    fill="#6A5F8A"
    opacity="0.50">signal / noise → ∞</text>
</svg>
